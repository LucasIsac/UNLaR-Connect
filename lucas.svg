<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 320" width="100%" height="100%">
  <!-- Connection Lines Group -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Cap Diamond Lines (Black/Dark) -->
    <line x1="60" y1="95" x2="150" y2="60" stroke="#1B1C1A" stroke-width="2.5" />
    <line x1="60" y1="95" x2="150" y2="130" stroke="#1B1C1A" stroke-width="2.5" />
    <line x1="150" y1="130" x2="240" y2="95" stroke="#1B1C1A" stroke-width="2.5" />
    <line x1="60" y1="95" x2="150" y2="95" stroke="#1B1C1A" stroke-width="2.5" />

    <!-- Cap Diamond Highlight Lines (Amber) -->
    <line x1="150" y1="60" x2="240" y2="95" stroke="#F59E0B" stroke-width="2.5" />
    <line x1="150" y1="95" x2="240" y2="95" stroke="#F59E0B" stroke-width="2.5" />

    <!-- Outer "U" Left Chain (Black) -->
    <line x1="60" y1="95" x2="80" y2="115" stroke="#1B1C1A" stroke-width="2.5" />
    <line x1="80" y1="115" x2="80" y2="150" stroke="#1B1C1A" stroke-width="2.5" />
    <line x1="80" y1="150" x2="80" y2="190" stroke="#1B1C1A" stroke-width="2.5" />
    <line x1="80" y1="190" x2="95" y2="225" stroke="#1B1C1A" stroke-width="2.5" />
    <line x1="95" y1="225" x2="120" y2="250" stroke="#1B1C1A" stroke-width="2.5" />
    <line x1="120" y1="250" x2="150" y2="260" stroke="#1B1C1A" stroke-width="2.5" />

    <!-- Outer "U" Right Chain (Black) -->
    <line x1="240" y1="95" x2="220" y2="115" stroke="#1B1C1A" stroke-width="2.5" />
    <line x1="220" y1="115" x2="220" y2="150" stroke="#1B1C1A" stroke-width="2.5" />
    <line x1="220" y1="150" x2="220" y2="190" stroke="#1B1C1A" stroke-width="2.5" />
    <line x1="220" y1="190" x2="205" y2="225" stroke="#1B1C1A" stroke-width="2.5" />
    <line x1="205" y1="225" x2="180" y2="250" stroke="#1B1C1A" stroke-width="2.5" />
    <line x1="180" y1="250" x2="150" y2="260" stroke="#1B1C1A" stroke-width="2.5" />

    <!-- Inner "U" Structure (Black) -->
    <line x1="150" y1="130" x2="110" y2="150" stroke="#1B1C1A" stroke-width="2.5" />
    <line x1="110" y1="150" x2="115" y2="205" stroke="#1B1C1A" stroke-width="2.5" />
    <line x1="115" y1="205" x2="150" y2="260" stroke="#1B1C1A" stroke-width="2.5" />

    <line x1="150" y1="130" x2="190" y2="150" stroke="#1B1C1A" stroke-width="2.5" />
    <line x1="190" y1="150" x2="185" y2="205" stroke="#1B1C1A" stroke-width="2.5" />
    <line x1="185" y1="205" x2="150" y2="260" stroke="#1B1C1A" stroke-width="2.5" />

    <!-- Diagonal Network Connections (Black) -->
    <line x1="80" y1="115" x2="110" y2="150" stroke="#1B1C1A" stroke-width="1.5" />
    <line x1="80" y1="150" x2="110" y2="150" stroke="#1B1C1A" stroke-width="1.5" />
    <line x1="95" y1="225" x2="115" y2="205" stroke="#1B1C1A" stroke-width="1.5" />

    <line x1="220" y1="115" x2="190" y2="150" stroke="#1B1C1A" stroke-width="1.5" />
    <line x1="220" y1="150" x2="190" y2="150" stroke="#1B1C1A" stroke-width="1.5" />
    <line x1="205" y1="225" x2="185" y2="205" stroke="#1B1C1A" stroke-width="1.5" />

    <!-- Network Cross-Connections Highlighted (Amber) -->
    <line x1="80" y1="150" x2="115" y2="205" stroke="#F59E0B" stroke-width="1.5" />
    <line x1="80" y1="190" x2="115" y2="205" stroke="#F59E0B" stroke-width="1.5" />
    <line x1="220" y1="150" x2="185" y2="205" stroke="#F59E0B" stroke-width="1.5" />
    <line x1="220" y1="190" x2="185" y2="205" stroke="#F59E0B" stroke-width="1.5" />

    <!-- Tassel hanging from Right Corner (Amber) -->
    <line x1="240" y1="95" x2="240" y2="135" stroke="#F59E0B" stroke-width="2" />
    <polygon points="237,135 243,135 245,155 235,155" fill="#F59E0B" />
    <circle cx="240" cy="135" r="3" fill="#F59E0B" />
  </g>

  <!-- Constellation Nodes (Circles) -->
  <g fill="#1B1C1A">
    <!-- Cap Diamond Nodes -->
    <circle cx="150" cy="60" r="5" />
    <circle cx="240" cy="95" r="5" />
    <circle cx="60" cy="95" r="5" />
    <circle cx="150" cy="130" r="5" />
    <circle cx="150" cy="95" r="5" />

    <!-- Left Chain Nodes -->
    <circle cx="80" cy="115" r="4.5" />
    <circle cx="80" cy="150" r="4.5" />
    <circle cx="80" cy="190" r="4.5" />
    <circle cx="95" cy="225" r="4.5" />
    <circle cx="120" cy="250" r="4.5" />
    <circle cx="150" cy="260" r="5" />

    <!-- Right Chain Nodes -->
    <circle cx="220" cy="115" r="4.5" />
    <circle cx="220" cy="150" r="4.5" />
    <circle cx="220" cy="190" r="4.5" />
    <circle cx="205" cy="225" r="4.5" />
    <circle cx="180" cy="250" r="4.5" />

    <!-- Inner Chain Nodes -->
    <circle cx="110" cy="150" r="4.5" />
    <circle cx="115" cy="205" r="4.5" />
    <circle cx="190" cy="150" r="4.5" />
    <circle cx="185" cy="205" r="4.5" />
  </g>
</svg>