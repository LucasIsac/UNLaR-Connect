<svg xmlns="http://www.w3.org/2000/svg" viewBox="50 50 200 220" width="100%" height="100%">
  <!-- Connection Lines Group (Amber) -->
  <g stroke="#F59E0B" stroke-linecap="round" stroke-linejoin="round">
    <!-- Outer Cap Outline (Thick, 100% Opacity) -->
    <line x1="60" y1="95" x2="150" y2="60" stroke-width="5.5" />
    <line x1="150" y1="60" x2="240" y2="95" stroke-width="5.5" />
    <line x1="60" y1="95" x2="150" y2="130" stroke-width="5.5" />
    <line x1="150" y1="130" x2="240" y2="95" stroke-width="5.5" />

    <!-- Inner Cap line (Thinner, 50% Opacity) -->
    <line x1="60" y1="95" x2="150" y2="95" stroke-width="3.5" opacity="0.5" />
    <line x1="150" y1="95" x2="240" y2="95" stroke-width="3.5" opacity="0.5" />

    <!-- Outer U Left Chain (Thick, 100% Opacity) -->
    <line x1="60" y1="95" x2="80" y2="115" stroke-width="5.5" />
    <line x1="80" y1="115" x2="80" y2="150" stroke-width="5.5" />
    <line x1="80" y1="150" x2="80" y2="190" stroke-width="5.5" />
    <line x1="80" y1="190" x2="95" y2="225" stroke-width="5.5" />
    <line x1="95" y1="225" x2="120" y2="250" stroke-width="5.5" />
    <line x1="120" y1="250" x2="150" y2="260" stroke-width="5.5" />

    <!-- Outer U Right Chain (Thick, 100% Opacity) -->
    <line x1="240" y1="95" x2="220" y2="115" stroke-width="5.5" />
    <line x1="220" y1="115" x2="220" y2="150" stroke-width="5.5" />
    <line x1="220" y1="150" x2="220" y2="190" stroke-width="5.5" />
    <line x1="220" y1="190" x2="205" y2="225" stroke-width="5.5" />
    <line x1="205" y1="225" x2="180" y2="250" stroke-width="5.5" />
    <line x1="180" y1="250" x2="150" y2="260" stroke-width="5.5" />

    <!-- Inner U Structure (Thinner, 50% Opacity) -->
    <line x1="150" y1="130" x2="110" y2="150" stroke-width="3.5" opacity="0.5" />
    <line x1="110" y1="150" x2="115" y2="205" stroke-width="3.5" opacity="0.5" />
    <line x1="115" y1="205" x2="150" y2="260" stroke-width="3.5" opacity="0.5" />

    <line x1="150" y1="130" x2="190" y2="150" stroke-width="3.5" opacity="0.5" />
    <line x1="190" y1="150" x2="185" y2="205" stroke-width="3.5" opacity="0.5" />
    <line x1="185" y1="205" x2="150" y2="260" stroke-width="3.5" opacity="0.5" />

    <!-- Diagonal Network Connections (Thinner, 50% Opacity) -->
    <line x1="80" y1="115" x2="110" y2="150" stroke-width="3.5" opacity="0.5" />
    <line x1="80" y1="150" x2="110" y2="150" stroke-width="3.5" opacity="0.5" />
    <line x1="95" y1="225" x2="115" y2="205" stroke-width="3.5" opacity="0.5" />

    <line x1="220" y1="115" x2="190" y2="150" stroke-width="3.5" opacity="0.5" />
    <line x1="220" y1="150" x2="190" y2="150" stroke-width="3.5" opacity="0.5" />
    <line x1="205" y1="225" x2="185" y2="205" stroke-width="3.5" opacity="0.5" />

    <!-- Network Cross-Connections Highlighted (Thinner, 50% Opacity) -->
    <line x1="80" y1="150" x2="115" y2="205" stroke-width="3.5" opacity="0.5" />
    <line x1="80" y1="190" x2="115" y2="205" stroke-width="3.5" opacity="0.5" />
    <line x1="220" y1="150" x2="185" y2="205" stroke-width="3.5" opacity="0.5" />
    <line x1="220" y1="190" x2="185" y2="205" stroke-width="3.5" opacity="0.5" />

    <!-- Tassel hanging from Right Corner (Thickened) -->
    <line x1="240" y1="95" x2="240" y2="135" stroke-width="4" />
    <polygon points="234,135 246,135 248,160 232,160" fill="#F59E0B" />
    <circle cx="240" cy="135" r="5.5" fill="#F59E0B" />
  </g>

  <!-- Constellation Nodes Group (Amber, Solid 100% Opacity) -->
  <g fill="#F59E0B">
    <!-- Cap Diamond Nodes (Large) -->
    <circle cx="150" cy="60" r="8" />
    <circle cx="240" cy="95" r="8" />
    <circle cx="60" cy="95" r="8" />
    <circle cx="150" cy="130" r="8" />
    <circle cx="150" cy="95" r="6" />

    <!-- Left Outer U Chain Nodes (Medium-Large) -->
    <circle cx="80" cy="115" r="7.5" />
    <circle cx="80" cy="150" r="7.5" />
    <circle cx="80" cy="190" r="7.5" />
    <circle cx="95" cy="225" r="7.5" />
    <circle cx="120" cy="250" r="7.5" />
    <circle cx="150" cy="260" r="8" />

    <!-- Right Outer U Chain Nodes (Medium-Large) -->
    <circle cx="220" cy="115" r="7.5" />
    <circle cx="220" cy="150" r="7.5" />
    <circle cx="220" cy="190" r="7.5" />
    <circle cx="205" cy="225" r="7.5" />
    <circle cx="180" cy="250" r="7.5" />

    <!-- Inner Truss Network Nodes (Medium) -->
    <circle cx="110" cy="150" r="6" />
    <circle cx="115" cy="205" r="6" />
    <circle cx="190" cy="150" r="6" />
    <circle cx="185" cy="205" r="6" />
  </g>
</svg>
