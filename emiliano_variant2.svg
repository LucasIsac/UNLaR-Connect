<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="100%" height="100%">
  <style>
    /* Light Theme (Default) Styles for high contrast */
    .network-cyan {
      stroke: #00838F;
    }
    .network-cyan-fill {
      fill: #00838F;
    }
    .triquetra-orange {
      stroke: #D97706;
    }
    .triquetra-orange-fill {
      fill: #D97706;
    }
    .ring-line {
      fill: none;
      stroke-width: 2.5px;
    }
    .spoke-line {
      stroke-width: 2.5px;
    }

    /* Dark Theme Styles (Triggered automatically by system preferences) */
    @media (prefers-color-scheme: dark) {
      .network-cyan {
        stroke: #00F0FF;
      }
      .network-cyan-fill {
        fill: #00F0FF;
      }
      .triquetra-orange {
        stroke: #F59E0B;
      }
      .triquetra-orange-fill {
        fill: #F59E0B;
      }
    }
  </style>

  <defs>
    <!-- Cyan network spoke templates with optimized line-weight -->
    <g id="spoke-long">
      <line x1="0" y1="-12" x2="0" y2="-92" class="network-cyan spoke-line" opacity="0.9" />
      <circle cx="0" cy="-92" r="6" class="network-cyan-fill" />
    </g>
    <g id="spoke-medium">
      <line x1="0" y1="-12" x2="0" y2="-80" class="network-cyan spoke-line" opacity="0.9" />
      <circle cx="0" cy="-80" r="6" class="network-cyan-fill" />
    </g>

    <!-- Central orange triquetra branch with enhanced thickness -->
    <g id="orange-branch">
      <circle cx="0" cy="-42" r="14" class="triquetra-orange-fill" />
      <path d="M -9,-36 L -15,-30 C -22,-21 -37,-8 -31,5" 
            fill="none" 
            class="triquetra-orange" 
            stroke-width="11" 
            stroke-linecap="round" 
            stroke-linejoin="round" />
    </g>
  </defs>

  <!-- Central Network Wheel (Cyan) -->
  <g transform="translate(110, 110)">
    <!-- Concentric rings with sturdier widths -->
    <circle cx="0" cy="0" r="12" class="network-cyan ring-line" opacity="0.9" />
    <circle cx="0" cy="0" r="24" class="network-cyan ring-line" opacity="0.8" />
    <circle cx="0" cy="0" r="46" class="network-cyan ring-line" opacity="0.5" />
    <circle cx="0" cy="0" r="72" class="network-cyan ring-line" opacity="0.7" />
    <circle cx="0" cy="0" r="6" class="network-cyan-fill" />

    <!-- 12-Spoke Radial System -->
    <use href="#spoke-long" />
    <use href="#spoke-medium" transform="rotate(30)" />
    <use href="#spoke-medium" transform="rotate(60)" />
    <use href="#spoke-long" transform="rotate(90)" />
    <use href="#spoke-medium" transform="rotate(120)" />
    <use href="#spoke-medium" transform="rotate(150)" />
    <use href="#spoke-medium" transform="rotate(165)" />
    <use href="#spoke-medium" transform="rotate(195)" />
    <use href="#spoke-medium" transform="rotate(210)" />
    <use href="#spoke-medium" transform="rotate(240)" />
    <use href="#spoke-long" transform="rotate(270)" />
    <use href="#spoke-medium" transform="rotate(300)" />
    <use href="#spoke-medium" transform="rotate(330)" />

    <!-- Foreground Triquetra (Orange) -->
    <use href="#orange-branch" />
    <use href="#orange-branch" transform="rotate(120)" />
    <use href="#orange-branch" transform="rotate(240)" />
  </g>
</svg>