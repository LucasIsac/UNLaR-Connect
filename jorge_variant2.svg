<svg xmlns="http://www.w3.org/2000/svg" viewBox="215 133 370 177" width="100%" height="100%">
  <style>
    /* Default (Light Theme) Colors for maximum contrast */
    :root {
      --color-teal-start: #0F766E;
      --color-teal-end: #10B981;
      --color-green-start: #10B981;
      --color-green-end: #F59E0B;
      --color-amber-start: #F59E0B;
      --color-amber-end: #D97706;
      --color-book-cover: #CBD5E1;
    }

    /* Dark Theme overrides (Triggers automatically via system preference) */
    @media (prefers-color-scheme: dark) {
      :root {
        --color-teal-start: #14B8A6;
        --color-teal-end: #34D399;
        --color-green-start: #34D399;
        --color-green-end: #FBBF24;
        --color-amber-start: #FBBF24;
        --color-amber-end: #F59E0B;
        --color-book-cover: #334155;
      }
    }
  </style>

  <defs>
    <!-- Brand Gradients powered by adaptive CSS variables -->
    <linearGradient id="teal-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--color-teal-start)" />
      <stop offset="100%" stop-color="var(--color-teal-end)" />
    </linearGradient>
    <linearGradient id="green-amber" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--color-green-start)" />
      <stop offset="100%" stop-color="var(--color-green-end)" />
    </linearGradient>
    <linearGradient id="amber-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--color-amber-start)" />
      <stop offset="100%" stop-color="var(--color-amber-end)" />
    </linearGradient>
  </defs>

  <!-- Left Figure (Teal/Green) with slightly enlarged head for small-scale balance -->
  <g>
    <circle cx="290" cy="170" r="23" fill="url(#teal-green)" />
    <path d="M 230,260 C 230,220 250,200 290,200 C 320,200 360,195 385,185 C 388,188 388,192 385,195 C 340,215 310,220 290,220 C 265,220 255,235 250,260 Z" fill="url(#teal-green)" />
  </g>

  <!-- Right Figure (Green/Amber) with slightly enlarged head -->
  <g>
    <circle cx="510" cy="170" r="23" fill="url(#green-amber)" />
    <path d="M 570,260 C 570,220 550,200 510,200 C 480,200 440,195 415,185 C 412,188 412,192 415,195 C 460,215 490,220 510,220 C 535,220 545,235 550,260 Z" fill="url(#green-amber)" />
  </g>

  <!-- Central Star - scaled up slightly to act as a clear focal connection -->
  <path d="M 400,158 L 406.5,172 L 421.5,173.5 L 410.5,184 L 414,199 L 400,190.5 L 386,199 L 389.5,184 L 378.5,173.5 L 393.5,172 Z" fill="url(#amber-glow)" />

  <!-- Bold, Clean Open Book (Base) -->
  <g>
    <!-- Dynamic Cover Shadow -->
    <path d="M 280,285 C 340,260 380,275 400,285 C 420,275 460,260 520,285 L 515,295 C 460,270 420,285 400,295 C 380,285 340,270 285,295 Z" fill="var(--color-book-cover)" />
    <!-- Left Page -->
    <path d="M 285,280 C 340,255 385,270 400,280 L 400,240 C 385,230 340,215 285,240 Z" fill="url(#teal-green)" />
    <!-- Right Page -->
    <path d="M 515,280 C 460,255 415,270 400,280 L 400,240 C 415,230 460,215 515,240 Z" fill="url(#green-amber)" />
  </g>
</svg>