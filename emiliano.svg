<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 220" width="100%" height="100%">
  <defs>
    <!-- Cyan network spoke templates -->
    <g id="spoke-long">
      <line x1="0" y1="-12" x2="0" y2="-92" stroke="#00F0FF" stroke-width="1.5" opacity="0.85" />
      <circle cx="0" cy="-92" r="3.5" fill="#00F0FF" />
    </g>
    <g id="spoke-medium">
      <line x1="0" y1="-12" x2="0" y2="-80" stroke="#00F0FF" stroke-width="1.5" opacity="0.85" />
      <circle cx="0" cy="-80" r="3.5" fill="#00F0FF" />
    </g>

    <!-- Central orange triquetra branch -->
    <g id="orange-branch">
      <circle cx="0" cy="-42" r="11" fill="#F59E0B" />
      <path d="M -9,-36 L -15,-30 C -22,-21 -37,-8 -31,5" 
            fill="none" 
            stroke="#F59E0B" 
            stroke-width="8" 
            stroke-linecap="round" 
            stroke-linejoin="round" />
    </g>
  </defs>

  <!-- Central Network Wheel (Cyan) -->
  <g transform="translate(110, 110)">
    <!-- Concentric rings -->
    <circle cx="0" cy="0" r="12" fill="none" stroke="#00F0FF" stroke-width="1.5" opacity="0.9" />
    <circle cx="0" cy="0" r="24" fill="none" stroke="#00F0FF" stroke-width="2" opacity="0.8" />
    <circle cx="0" cy="0" r="46" fill="none" stroke="#00F0FF" stroke-width="1.5" opacity="0.5" />
    <circle cx="0" cy="0" r="72" fill="none" stroke="#00F0FF" stroke-width="2" opacity="0.7" />
    <circle cx="0" cy="0" r="4" fill="#00F0FF" />

    <!-- 12-Spoke Radial System -->
    <use href="#spoke-long" />
    <use href="#spoke-medium" transform="rotate(30)" />
    <use href="#spoke-medium" transform="rotate(60)" />
    <use href="#spoke-long" transform="rotate(90)" />
    <use href="#spoke-medium" transform="rotate(120)" />
    <use href="#spoke-medium" transform="rotate(150)" />
    <use href="#spoke-medium" transform="rotate(165)" />
    <use href="#spoke-medium" transform="rotate(195)" />
    <use href="#spoke-medium" transform="rotate(210)" />
    <use href="#spoke-medium" transform="rotate(240)" />
    <use href="#spoke-long" transform="rotate(270)" />
    <use href="#spoke-medium" transform="rotate(300)" />
    <use href="#spoke-medium" transform="rotate(330)" />

    <!-- Foreground Triquetra (Orange) -->
    <use href="#orange-branch" />
    <use href="#orange-branch" transform="rotate(120)" />
    <use href="#orange-branch" transform="rotate(240)" />
  </g>
</svg>